    source_url: "https://uproxx.com/life/anthony-bourdain-parts-unknown-trinidad/2/"
    description: "A trip to the Caribbean uncovers how the island of Trinidad has turned a history of colonialism and slavery into a non-stop celebration of multicultural food, music and good times. Bourdain visits Port of Spain, a vibrant city of African, Indian, Chinese and Middle Eastern influence, where he dines on curried duck, doubles (floppy Indian bread topped with curry chickpeas, mango) and fish in tahini sauce with Trinidadians of contrasting cultures. While the Carnival lifestyle revolves around liming (hanging out) and whining (dancing), Bourdain questions the extent to which this non-stop bacchanal distracts residents from the the country's growing list of social ills."

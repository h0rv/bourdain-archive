    description: "The gloves are off and the rivalry continues as Bourdain and his long time friend, three-Michelin-starred chef Eric Ripert, embark on a ski-and-cheese-filled journey through the French Alps - home advantage Ripert? Bourdain gets a glimpse into Ripert's early life while tending a little too closely to cows, and overindulging in delicious cheese dishes. The pair team up to prepare a French meal, featuring caviar and steak au poivre, with the help of Ripert's mentor Maurice Guillouet. Bourdain and Ripert also venture across the Italian border to La Maison Rose and surrender to Bourdain's love of pasta with gnocchi, ravioli, and polenta."

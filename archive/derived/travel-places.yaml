    description: "Hong Kong, a city that's always in transition and unapologetically modern has another side... a beautiful one that's in danger of disappearing entirely. Bourdain experiences this city through the eyes and lens of legendary cinematographer and longtime Hong Kong resident Christopher Doyle (Chungking Express, In the Mood for Love, The White Girl)."

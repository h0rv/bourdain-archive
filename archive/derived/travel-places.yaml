    source_url: "https://explorepartsunknown.com/sri-lanka/bourdains-field-note-sri-lanka/"
    description: "As peace spreads throughout Sri Lanka following the end of its brutal civil war, Bourdain travels to the once divided nation to experience the reinvigorated people, food and landscapes. Starting in Colombo, the country's capital, Bourdain discovers change in in a place he visited nearly a decade ago as he enjoys street food on The Galle Face Green, dining on light curries and lots of seafood. Taking a 10-hour train to the northern \"time capsule\" city of Jaffna, Bourdain experiences crab curry, a dish he calls the \"holy grail of Sri Lankan cuisine\", for its spicy and fiery flavors."

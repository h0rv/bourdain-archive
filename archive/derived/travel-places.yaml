    description: "The rich sensory experience of Laos with its enchanting scenery, distinctive aromas, and exceptional food are explored in Bourdain's trip to this Southeast Asian country which also continues to suffer the effects of the Secret War by the U.S in the 1960's-1970's. In his travels, the host takes in a boat festival, dines on imperial dishes at the Ban Lao hotel prepared by Mama Vahn, and communes with residents who have fallen victim to active bombs that still pepper the countryside."

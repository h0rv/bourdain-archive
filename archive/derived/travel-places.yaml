    source_url: "https://en.wikipedia.org/wiki/Anthony_Bourdain:_Parts_Unknown"
    description: "Once considered the most dangerous city in the world, Lagos is, in many ways, the epicenter of modern Africa. The driving force of the city is a pervasive, almost pathologically positive outlook, a sincerely entrenched \"can do\" spirit. The ingenuity of the Nigerian people is the focus of Bourdain's travels as he explores its food, music, and rich cultural diversity. Among the food offerings are fresh fish dishes, spicy soups, a great deal of beef, and the ubiquitous pounded yam. Bourdain also spends time with Femi, Seun and Yeni Kuti, the children of Fela Kuti, a family that is still at the heart of Lagos' creative, political and cultural scene."

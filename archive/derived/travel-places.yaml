    description: "An exploration of this rocky, east coast Canadian island by Bourdain reveals a magical place abundant in fish and wild game and steeped in distinctive traditions. Guided by prominent chefs Frederic Moran, Jeremy Charles and David McMillan, the host takes part in cod fishing, moose hunting, and axe throwing and dines on charred whelk with brasciola, caribou tartare, and Newfoundland classic Jiggs Dinner (boiled meat & vegetables). A side trip to the nearby French archipelago of St. Pierre is the setting for a home cooked meal of sea urchin pâté, stuffed squid over rice and braised halibut."

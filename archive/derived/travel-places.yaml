    description: "Bourdain discovers a hub of international cuisines and cultures in the New York City Borough of Queens. Traveling via the No. 7 train, the host dines on morcilla (blood sausage) with Sean Basinski of the Street Vendor Project in Corona, samples Chinese food in Flushing with Swet Shop Boys member Himanshu Suri, imbibes at historic Neirs Tavern (seen in GoodFellas) in Woodhaven, eats a Tibetan dinner at Llasa Fast Food in Jackson Heights, and takes a detour to Aqueduct racetrack in South Ozone Park with his Appetites cookbook co-author Laurie Woolever."

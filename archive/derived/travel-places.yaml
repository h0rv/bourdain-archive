    description: "Tony heads back to China and visits Shanghai, a budding economic superpower, where he discovers that Shanghai is considered the dumpling capital of the world made famous by its soup dumpling. Tony then heads to Yunnan province. In Dali, he learns from the Bai ethnic minority people a unique way of catching fish. From there, he works his way north to Lijiang, then to Zhongdian, an ethnically Tibetan area, in search of the valley of Shangri-La as described in British author James Hilton's novel Lost Horizon. The Lijiang/Zhongdian area is believed by many to have been the inspiration for the mythical Shangri-la."

    description: "Bourdain immerses himself in the \"boom or bust\" city of Seattle. Two industries are reshaping the city and its culture - tech and the newly legalized cannabis industry. Bourdain gets the skinny on the \"tech bro\" invasion of Capitol Hill, throws back a dozen succulent oysters at the Taylor Shellfish Company and enjoys fish & chips at the Pacific Inn Pub with band members of The Gods Themselves. Along the way, he also hangs out with legendary Seattle rocker, Mark Lanegan and mad food scientist, Nathan Myhrvold."

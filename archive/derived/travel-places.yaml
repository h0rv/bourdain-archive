    description: "In this celebration of Louisiana's Cajun culture, complete with Zydeco music and a crawfish boil, Bourdain goes off the beaten path and takes part in the less familiar Mardi Gras traditions of the region's history stemming from the French Middle Ages. Donning a conical hat, mask and colorful fringed costume, the host participates in the day long Courir de Mardi Gras in Mamou. Meals include a home cooked meal in Grand Coteau, lunch at Laura's 2 in Lafayette with creole cowboys, and boudin & cracklings at Billy's in Opelousas."

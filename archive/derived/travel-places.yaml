    source_url: "https://en.wikipedia.org/wiki/Anthony_Bourdain:_Parts_Unknown"
    description: "In Berlin - an anomaly among German metropolises - Bourdain encounters an extremely accepting society, teeming with unbridled creativity, despite a grim history. Against the backdrop of Berlin Wall remnants, the host communes with musician Anton Newcombe (Brian Jonestown Massacre) for a home-cooked meal, and electronic artist Ellen Allien over a lunch of sausage made from chicken, pigs feet and sage at Michelberger. Bourdain also mixes in with photographers, club bouncers, cabaret owners, and historians, to discuss this city's unparalleled culture."

    description: "The\"Heel of the Boot\" draws Bourdain back in time as he visits the largely untouched landscapes and colorful locals of Southern Italy and a culture steeped in both Christian and Pagan traditions. Unlike any other part of Italy, locals here perform a Taranta dance and speak the ancient language of \"Grieco\". The local cuisine of the Southern Italy is showcased during a meal with Italian-American film director Francis Ford Coppola at his hotel, Palazzo Margherita, where Bourdain is served traditional dishes of the Basilicata region like 'Pecora Pastorale', a Summer preparation of mutton and herbs."

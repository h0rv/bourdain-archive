    description: "Bourdain returns to Uruguay after a decade away and finds a progressive nation in the midst of social change, but with evident fragments of its colonial past, most notably in its local cuisine. Accompanied by Uruguayan native and restaurateur/chef Ignacio \"Nacho\" Mattos, the two visit his hometown of Santa Lucia for a home cooked Italian family meal made by his grandmother, head for a night out in Montevideo with local band Hablan Por La Espalda, sample drive-thru steaks, and cap off the trip with an asado (barbecue) with friends on a small island in Jose Ignacio."

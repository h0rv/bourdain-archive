    description: "Bourdain and film director Darren Aronofsky (Requiem for a Dream, Black Swan) tour the remote South Asian Kingdom of Bhutan and travel on the winding East/West highway known for its spectacular views of the Himalayan Mountains. The seasoned explorers share a meal with yak herders, visit the capitol city of Thimphu for traditional Bhutanese cuisine, drive to Punakha to explore the village of legendary divine monk Drupka Kinley, and visit Bumthang for a bamboo archery competition."

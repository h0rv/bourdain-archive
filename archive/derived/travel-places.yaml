    region: "North America"
    latitude: 40.440625
    longitude: -79.995886
    source_url: "https://en.wikipedia.org/wiki/Anthony_Bourdain:_Parts_Unknown"
    description: "Bourdain delves into a dining scene at a crossroads: part iconic steel city defined by blue-collar, working-class comfort food - steak and potatoes, sausage and sauerkraut - and part foodie boom-town catering to the new high-tech industry. Bourdain criss-crosses the fault lines of old and new by sitting down with, among others, professional wrestlers, a civil rights activist, and writer and Pittsburgh native Stewart O'Nan. Pioneer chefs of the city's burgeoning restaurant scene Sonja Finn and Justin Severino host a back-country pig roast. And chef Kevin Suousa serves grass fed beef short ribs at his new restaurant, Superior Motors."

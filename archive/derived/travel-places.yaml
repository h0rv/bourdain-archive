    description: "Bourdain takes a wide-angle look at the culture and history of this country, heavily influenced by Europe and Russia, with guides musician of Armenian descent Serj Tankian (System of a Down), and historian/Armenian resident Richard Giragosian. Breaking bread with Tankian at the restaurant Dolmama in Yerevan, during dinners with locals, the host explores the native and diaspora Armenian populations' survival and achievements against the odds."

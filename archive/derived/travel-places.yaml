    description: "Bourdain digs deep into the proud, often misunderstood culture of West Virginia, as he traverses a 5,000 foot mine, observes the demolition derby-like sport of rock-bouncing and dines on signature Appalachian dishes. Bourdain's own preconceptions are dashed as he finds the West Virginian attitude to be a remarkable dichotomy, both resolute and open-minded. Over an assortment of local dishes - snapping turtle patties, squirrel gravy, pawpaw ice cream, spaghetti pie, and bear meat - residents candidly discuss their staunch views on the second amendment, Donald Trump, life beyond the coal industry, and the reclamation of West Virginian cuisine."

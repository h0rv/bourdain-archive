    description: "When Bourdain heads to Puerto Rico to check out the reality behind the piña coladas and fancy resorts, he finds natural splendor, delicious food and warm people, all against the background of a seemingly insurmountable economic crisis. Bourdain also learns why Puerto Ricans are so devoted to their homeland, and so determined to stay there. He samples 'grandma food' at a restaurant that evokes a simple traditional Puerto Rican home, cracks open the freshest crabs at a rustic spot on the beach, joins singer Tito Auger for a meal with friends and enjoys some of the best lechon (roast pork) around. A trip to the small island of Vieques rounds out his experience, with a meal at a sustainable farm and an optimistic discussion about strategies for a better future for the region and its people."

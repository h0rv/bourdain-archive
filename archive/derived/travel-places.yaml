    source_url: "https://en.wikipedia.org/wiki/Anthony_Bourdain:_Parts_Unknown"
    description: "Bourdain tours the historically rich streets of Singapore and immerses himself in the vast array of multicultural foods found throughout this island city-state. An old-school style prawn mee lunch with his go-to Singaporean food guide, KF Seetoh, and a trip down to the Muslim quarter for a soup-like dish of wontons, rice cake, coconut gravy, vegetables, and hard boiled eggs are included in the host's cuisine-driven excursion. Bourdain also explores the dichotomy of Singapore society that is known for its tolerance of diverse cultures, generous social services, and sanctioned diversions (ex. legalized brothels, casinos), and the restriction of such basic civil liberties as freedom of the press and privacy."
